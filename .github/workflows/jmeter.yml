name: JMeter Performance Tests

on:
  push:
    branches:
      - master

jobs:
  jmeter-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17  # Рекомендовано 17 для стабільної роботи JMeter 5.6.3

      - name: Install JMeter
        run: |
          wget https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          mv apache-jmeter-5.6.3 jmeter

      - name: Run JMeter Test
        run: |
          # 1. Видаляємо папки, якщо вони існують, щоб вони були гарантовано порожніми
          rm -rf results_task reports_html
          
          # 2. Створюємо їх заново (mkdir -p не видасть помилку, якщо папка вже є)
          mkdir -p results_task reports_html
          
          # 3. Запускаємо JMeter
          ./jmeter/bin/jmeter -n \
            -t test-plans/load_test.jmx \
            -l results_task/results.jtl \
            -e \
            -o reports_html

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: reports_html