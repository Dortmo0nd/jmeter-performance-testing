name: JMeter Performance Tests

on:
  push:
    branches:
      - master

jobs:
  jmeter-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        [cite_start]uses: actions/checkout@v4 [cite: 186, 187]

      - name: Setup Java
        [cite_start]uses: actions/setup-java@v4 [cite: 188, 189]
        with:
          [cite_start]distribution: temurin [cite: 191]
          [cite_start]java-version: 17 [cite: 192]

      - name: Install JMeter
        run: |
          wget https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz [cite: 195, 196]
          tar -xzf apache-jmeter-5.6.3.tgz [cite: 197]
          mv apache-jmeter-5.6.3 jmeter [cite: 198]

      - name: Run JMeter Test
        run: |
          mkdir -p results reports [cite: 201]
          ./jmeter/bin/jmeter -n \
            -t test-plans/load_test.jmx \
            -l results/results.jtl \
            -e \
            -o reports/html-report [cite: 202, 203, 204, 205, 206]

      - name: Upload HTML Report
        [cite_start]uses: actions/upload-artifact@v4 [cite: 207, 208]
        with:
          [cite_start]name: jmeter-html-report [cite: 210]
          [cite_start]path: reports/html-report [cite: 211]